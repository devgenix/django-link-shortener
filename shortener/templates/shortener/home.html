<!DOCTYPE html>
<html>
<head><title>Link Shortener</title></head>
<body>
    <h1>Shorten your URL</h1>
    <form method="post">
        {% csrf_token %}
        <input type="url" name="url" placeholder="Enter URL" required>
        <button type="submit">Shorten</button>
    </form>
    {% if short_url %}
        <p>Your short link: <a href="{{ short_url }}">{{ short_url }}</a></p>
    {% endif %}
</body>
</html>
